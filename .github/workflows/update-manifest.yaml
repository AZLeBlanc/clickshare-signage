name: Update Image Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'images/**'

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate images.json
        run: |
          python3 - <<'EOF'
          import json, os

          IMAGE_DIR = "images"
          OUTPUT_FILE = "images.json"
          EXTENSIONS = {".jpg", ".jpeg", ".png", ".gif", ".webp"}

          # Load existing config to preserve interval/transition
          if os.path.exists(OUTPUT_FILE):
              with open(OUTPUT_FILE) as f:
                  existing = json.load(f)
          else:
              existing = {}

          # Scan images/ folder, skip hidden files and .gitkeep
          found = sorted([
              f"{IMAGE_DIR}/{f}"
              for f in os.listdir(IMAGE_DIR)
              if os.path.splitext(f)[1].lower() in EXTENSIONS
              and not f.startswith(".")
          ])

          # Build new config
          config = {
              "_note": "This file is auto-generated by GitHub Actions. Don't edit manually.",
              "interval": existing.get("interval", 15000),
              "transition": existing.get("transition", 2000),
              "images": found
          }

          with open(OUTPUT_FILE, "w") as f:
              json.dump(config, f, indent=2)

          print(f"✓ Found {len(found)} images")
          for img in found:
              print(f"  • {img}")
          EOF

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images.json
          
          # Only commit if something changed
          if git diff --staged --quiet; then
            echo "No changes to images.json"
          else
            git commit -m "chore: update image manifest [skip ci]"
            git push
          fi
